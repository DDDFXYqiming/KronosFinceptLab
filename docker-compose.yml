version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    ports:
      - "3000:3000"
      - "8000:8000"
    environment:
      - KRONOS_MODEL_ID=NeoQuasar/Kronos-base
      - KRONOS_DEVICE=cpu
      - PORT=3000
      - API_PORT=8000
      - INTERNAL_API_URL=http://localhost:8000
    volumes:
      - ./external:/app/external:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
